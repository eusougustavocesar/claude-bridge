<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640" fill="none" role="img" aria-label="claude-bridge social preview">
  <!-- background -->
  <rect width="1280" height="640" fill="#0a0a0a"/>

  <!-- subtle grid lines -->
  <g opacity="0.05" stroke="#fafafa" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <!-- symbol -->
  <g transform="translate(110, 260)">
    <circle cx="0" cy="30" r="16" fill="#fafafa"/>
    <circle cx="120" cy="30" r="16" fill="#fafafa"/>
    <path d="M16 30 H104" stroke="#00ffa9" stroke-width="10" stroke-linecap="round"/>
  </g>

  <!-- wordmark (large) -->
  <text x="110" y="410" fill="#fafafa"
        font-family="Geist, Inter, -apple-system, system-ui, sans-serif"
        font-weight="700" font-size="96" letter-spacing="-0.02em">
    <tspan>claude</tspan><tspan fill="#00ffa9">-</tspan><tspan>bridge</tspan>
  </text>

  <!-- tagline primary -->
  <text x="110" y="478" fill="#fafafa"
        font-family="Geist, Inter, -apple-system, system-ui, sans-serif"
        font-weight="400" font-size="34" letter-spacing="-0.015em">Persistent Claude Code across messaging channels.</text>

  <!-- tagline secondary -->
  <text x="110" y="522" fill="#97979f"
        font-family="Geist, Inter, -apple-system, system-ui, sans-serif"
        font-weight="400" font-size="26" letter-spacing="-0.01em">Mac stays closed. Claude keeps working.</text>

  <!-- mono footer -->
  <text x="110" y="588" fill="#97979f"
        font-family="Geist Mono, JetBrains Mono, ui-monospace, monospace"
        font-weight="500" font-size="20">MIT · ~50 MB · macOS (Linux soon)</text>

  <text x="1170" y="588" fill="#97979f" text-anchor="end"
        font-family="Geist Mono, JetBrains Mono, ui-monospace, monospace"
        font-weight="500" font-size="20">v0.1.0</text>
</svg>
